apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-native-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-native-app
  template:
    metadata:
      labels:
        app: cloud-native-app
    spec:
      containers:
        - name: app
          image: ${{ secrets.DOCKERHUB_USERNAME }}/cloud-native-app:${{ github.sha }}
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-native-app
spec:
  type: LoadBalancer
  selector:
    app: cloud-native-app
  ports:
    - port: 80
      targetPort: 80